<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мемориал Вороново · Карта памятников</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            overflow: hidden;
            background: #1e3a3f;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .map-container {
            flex: 0 0 60%;
            height: 100vh;
            position: relative;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
            transition: flex 0.3s ease;
        }

        .app.panel-collapsed .map-container {
            flex: 0 0 100%;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #2d4c6e;
        }

        .info-panel {
            flex: 0 0 40%;
            height: 100vh;
            background: #f5efe3;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-left: 4px solid #7d9d8e;
            position: relative;
            transition: flex 0.3s ease;
        }

        .app.panel-collapsed .info-panel {
            flex: 0 0 70px;
        }

        .panel-header {
            padding: 18px 22px;
            background: #2d5e5a;
            color: white;
            border-bottom: 3px solid #e6c8a0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .header-title h1 i {
            color: #ffd966;
            font-size: 1.4rem;
        }

        .header-title p {
            font-size: 0.85rem;
            opacity: 0.9;
            white-space: nowrap;
        }

        .app.panel-collapsed .header-title {
            display: none;
        }

        .panel-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .app.panel-collapsed .panel-content {
            opacity: 0;
            pointer-events: none;
        }

        .panel-columns {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 2px;
            background: #cfb99a;
        }

        .places-list {
            width: 35%;
            background: #f5efe3;
            overflow-y: auto;
            padding: 15px 12px;
            flex-shrink: 0;
        }

        .places-list h3 {
            color: #2d5e5a;
            font-size: 1rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #b5996b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .place-item {
            background: white;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
            border: 1px solid #cfb99a;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .place-item:hover {
            background: #e8d9c4;
            transform: translateX(3px);
        }

        .place-item.active {
            background: #d4bc9a;
            border-color: #5f4a2e;
            border-width: 2px;
        }

        .place-icon {
            width: 32px;
            height: 32px;
            background: #2d5e5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd78c;
            font-size: 0.9rem;
            flex-shrink: 0;
            border: 2px solid #b5996b;
        }

        .place-info {
            flex: 1;
            overflow: hidden;
        }

        .place-info h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1e2f3f;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .place-info p {
            font-size: 0.7rem;
            color: #6f5e48;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .point-detail {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 20px;
            border-left: 1px solid #cfb99a;
        }

        .point-detail h4 {
            color: #2d5e5a;
            font-size: 1.3rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e6c8a0;
        }

        .point-detail .type-badge {
            display: inline-block;
            background: #f0e4d2;
            color: #5f4a2e;
            font-size: 0.85rem;
            padding: 5px 12px;
            border-radius: 25px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .point-detail .description {
            font-size: 1rem;
            color: #2c3e4f;
            margin-bottom: 20px;
            line-height: 1.6;
            background: #f9f5ed;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #b5996b;
        }

        .point-detail .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .point-detail .link-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: #f5efe3;
            border: 1px solid #cfb99a;
            border-radius: 8px;
            text-decoration: none;
            color: #2d5e5a;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .point-detail .link-btn:hover {
            background: #e6d8c4;
            border-color: #b5996b;
            transform: translateY(-2px);
        }

        .point-detail .link-btn i {
            width: 20px;
            color: #b8860b;
            font-size: 1.1rem;
        }

        /* Кнопка теста в правом нижнем углу с надписью */
        .test-button {
            position: fixed;
            bottom: 30px;
            right: calc(40% + 30px);
            background: linear-gradient(135deg, #c41e3a, #8b0000);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1500;
            border: 2px solid #ffd966;
            font-weight: 700;
            font-size: 1rem;
        }

        .test-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            background: linear-gradient(135deg, #e03a56, #a01010);
        }

        .test-button i {
            font-size: 1.2rem;
        }

        .app.panel-collapsed .test-button {
            right: 30px;
        }

        .panel-toggle-btn {
            position: fixed;
            top: 20px;
            right: calc(40% + 30px);
            width: 48px;
            height: 48px;
            background: #2d5e5a;
            border: 3px solid #e6c8a0;
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.4rem;
            z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .app.panel-collapsed .panel-toggle-btn {
            right: 30px;
        }

        .panel-toggle-btn:hover {
            background: #3a7a74;
            transform: scale(1.1);
        }

        .mini-icons {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
            overflow-y: auto;
            height: 100%;
        }

        .app.panel-collapsed .mini-icons {
            display: flex;
        }

        .mini-icon {
            width: 44px;
            height: 44px;
            background: #2d5e5a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd78c;
            font-size: 1.2rem;
            border: 2px solid #e6c8a0;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .mini-icon:hover {
            transform: scale(1.1);
            background: #3a7a74;
        }

        .mini-icon.active {
            background: #3a7a74;
            border-color: #ffd700;
        }

        .human-icon {
            position: absolute;
            bottom: 0;
            left: 0;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: bounce 0.5s ease-out;
        }

        @keyframes bounce {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .human-icon svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="map-container">
            <div id="map"></div>
        </div>

        <div class="panel-toggle-btn" onclick="togglePanel()">
            <i class="fas fa-chevron-right" id="toggleIcon"></i>
        </div>

        <!-- Кнопка теста с надписью -->
        <div class="test-button" id="testButton">
            <i class="fas fa-pencil-alt"></i>
            <span>Пройти тест</span>
        </div>

        <div class="info-panel">
            <div class="panel-header">
                <div class="header-title">
                    <h1><i class="fas fa-map-location-dot"></i> Вороново</h1>
                    <p>Памятники и мемориалы</p>
                </div>
            </div>

            <div class="mini-icons" id="miniIcons"></div>

            <div class="panel-content">
                <div class="panel-columns">
                    <div class="places-list">
                        <h3><i class="fas fa-list"></i> Объекты</h3>
                        <div id="places-list"></div>
                    </div>

                    <div class="point-detail" id="point-detail">
                        <h4 id="detail-name"><i class="fas fa-monument"></i> <span></span></h4>
                        <div id="detail-type" class="type-badge"></div>
                        <div id="detail-description" class="description"></div>
                        <div class="links">
                            <a id="google-maps-link" href="#" target="_blank" class="link-btn">
                                <i class="fas fa-map-marked-alt"></i> Открыть в Google Картах
                            </a>
                            <a id="yandex-maps-link" href="#" target="_blank" class="link-btn">
                                <i class="fas fa-map"></i> Открыть в Яндекс Картах
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Данные памятников
        let memorials = [
            {
                id: 2,
                name: 'Захоронение жертв войн',
                lat: 54.1404,
                lng: 25.3116,
                type: 'Захоронение',
                description: 'На юго-западной окраине г. п. Вороново, слева от дороги Вороново-Лида, захоронены 1834 жителя, расстрелянные немецко-фашистскими захватчиками. Имена 629 захороненных неизвестны. В 1964 году на могиле поставлен обелиск.',
                category: 'burial'
            },
            {
                id: 3,
                name: 'Захоронение жертв войн',
                lat: 54.1547,
                lng: 25.3228,
                type: 'Захоронение',
                description: 'На северо-восточной окраине г. п. Вороново, возле железной дороги, захоронено 800 жителей г. Вильнюса, которых немецко-фашистские захватчики привезли на железнодорожную станцию г. п. Вороново и 14.11.1941 года расстреляли. В 1964 году на могиле поставлен обелиск.',
                category: 'burial'
            },
            {
                id: 4,
                name: 'Улица в честь Т.Я. Литовчика',
                lat: 54.152,
                lng: 25.3146,
                type: 'Улица',
                description: 'Улица Литовчика в Воронове носит имя Тихона Яковлевича Литовчика, который был полковником и участником Великой Отечественной войны. Он был кавалером ордена Славы и почетным гражданином Вороновского района. Улица была названа в его честь, чтобы помнить его заслуги и мужество в борьбе за свободу.',
                category: 'street'
            },
            {
                id: 5,
                name: 'Памятник А. Канарчику',
                lat: 54.15178,
                lng: 25.3219,
                type: 'памятник',
                description: 'Памятник Александру Канарчику установлен в Вороновском поселке в честь его героизма и заслуг. Он был Героем Советского Союза, который сражался в Великой Отечественной войне и получил множество орденов и медалей. Памятник был установлен в 2009 году и расположен возле Вороновской средней школы, где пионерская дружина носит имя Канарчика.',
                category: 'hero'
            },
            {
                id: 6,
                name: 'Воинское захоронение',
                lat: 54.15,
                lng: 25.3165,
                type: 'Захоронение',
                description: 'В центре поселка похоронены 192 воина и партизана, которые погибли в годы Великой Отечественной войны. В этой братской могиле захоронен и Герой Советского Союза Канарчик Александр Иванович. В 1954 году на могиле установлен памятник-скульптура воина с автоматом, перед которым расположены доски с именами погибших. В 2006 году произведен капитальный ремонт памятника.',
                category: 'military'
            },
            {
                id: 7,
                name: 'Памятник Ленину',
                lat: 54.15169,
                lng: 25.3183,
                type: 'памятник',
                description: 'Памятник Ленину в посёлке Вороново установлен в честь Великой Октябрьской революции и символизирует социальную справедливость и историческое значение для белорусского народа. Он был открыт в честь 107-й годовщины революции и отмечает важные события, которые сделали страну независимой и заложили фундамент для дальнейшего развития.',
                category: 'lenin'
            }
        ];

        function getIconByCategory(category) {
            const icons = {
                burial: { icon: 'fa-cross', color: '#6b4c3b', markerColor: '#6b4c3b' },
                street: { icon: 'fa-road', color: '#2c7a4d', markerColor: '#2c7a4d' },
                hero: { icon: 'fa-star-of-life', color: '#c41e3a', markerColor: '#c41e3a' },
                military: { icon: 'fa-shield-alt', color: '#4a6d8c', markerColor: '#4a6d8c' },
                lenin: { icon: 'fa-user', color: '#b8860b', markerColor: '#b8860b' },
                default: { icon: 'fa-monument', color: '#b87333', markerColor: '#b87333' }
            };
            return icons[category] || icons.default;
        }

        const map = L.map('map').setView([54.1492, 25.3198], 15);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri',
            maxZoom: 20
        }).addTo(map);

        let markers = [];
        let currentHumanIcon = null;

        function createHumanIcon(lat, lng) {
            if (currentHumanIcon) map.removeLayer(currentHumanIcon);
            const svgHtml = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" fill="#3498db" stroke="#2c3e50"/><circle cx="12" cy="7" r="4" fill="#e74c3c" stroke="#2c3e50"/><path d="M12 11v6" stroke="#2c3e50"/><path d="M9 14h6" stroke="#2c3e50"/></svg>`;
            const humanIcon = L.marker([lat, lng], {
                icon: L.divIcon({ className: 'human-icon', html: svgHtml, iconSize: [40, 40], iconAnchor: [20, 40] }),
                zIndexOffset: 1000
            }).addTo(map);
            return humanIcon;
        }

        function createMarker(place) {
            const iconInfo = getIconByCategory(place.category);
            const marker = L.marker([place.lat, place.lng], {
                icon: L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="width:38px;height:38px;background:radial-gradient(circle at 30% 30%, ${iconInfo.markerColor}, ${iconInfo.markerColor}dd);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #ffd700;box-shadow:0 4px 10px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;"><i class="fas ${iconInfo.icon}" style="color:white;font-size:18px;transform:rotate(45deg);"></i></div>`,
                    iconSize: [38, 38], iconAnchor: [19, 34]
                })
            }).addTo(map);
            marker.on('click', () => { showPointInfo(place); highlightListItem(place.id); map.setView([place.lat, place.lng], 16); currentHumanIcon = createHumanIcon(place.lat, place.lng); });
            return marker;
        }

        function showPointInfo(place) {
            document.querySelector('#detail-name span').textContent = place.name;
            document.getElementById('detail-type').textContent = place.type;
            document.getElementById('detail-description').textContent = place.description;
            document.getElementById('google-maps-link').href = `https://www.google.com/maps/search/?api=1&query=${place.lat},${place.lng}`;
            document.getElementById('yandex-maps-link').href = `https://yandex.ru/maps/?pt=${place.lng},${place.lat}&z=17&l=map`;
        }

        memorials.forEach(place => { markers.push(createMarker(place)); });

        const listContainer = document.getElementById('places-list');
        const miniIconsContainer = document.getElementById('miniIcons');
        
        memorials.forEach(place => {
            const iconInfo = getIconByCategory(place.category);
            const item = document.createElement('div');
            item.className = 'place-item';
            item.setAttribute('data-id', place.id);
            item.innerHTML = `<div class="place-icon"><i class="fas ${iconInfo.icon}"></i></div><div class="place-info"><h4>${place.name}</h4><p>${place.type}</p></div>`;
            item.addEventListener('click', () => { map.setView([place.lat, place.lng], 16); showPointInfo(place); highlightListItem(place.id); currentHumanIcon = createHumanIcon(place.lat, place.lng); });
            listContainer.appendChild(item);
            
            const miniIcon = document.createElement('div');
            miniIcon.className = 'mini-icon';
            miniIcon.setAttribute('data-id', place.id);
            miniIcon.innerHTML = `<i class="fas ${iconInfo.icon}"></i>`;
            miniIcon.addEventListener('click', () => { map.setView([place.lat, place.lng], 16); document.querySelectorAll('.mini-icon').forEach(el => el.classList.remove('active')); miniIcon.classList.add('active'); showPointInfo(place); highlightListItem(place.id); currentHumanIcon = createHumanIcon(place.lat, place.lng); });
            miniIconsContainer.appendChild(miniIcon);
        });

        function highlightListItem(id) {
            document.querySelectorAll('.place-item').forEach(el => { el.classList.remove('active'); if (el.dataset.id == id) el.classList.add('active'); });
            document.querySelectorAll('.mini-icon').forEach(el => { el.classList.remove('active'); if (el.dataset.id == id) el.classList.add('active'); });
        }

        function togglePanel() {
            const app = document.querySelector('.app');
            app.classList.toggle('panel-collapsed');
            const toggleIcon = document.getElementById('toggleIcon');
            toggleIcon.className = app.classList.contains('panel-collapsed') ? 'fas fa-chevron-left' : 'fas fa-chevron-right';
            setTimeout(() => map.invalidateSize(), 300);
        }

        document.getElementById('testButton').addEventListener('click', () => {
            window.location.href = 'test.html';
        });

        setTimeout(() => {
            if (memorials.length > 0) { showPointInfo(memorials[0]); highlightListItem(memorials[0].id); currentHumanIcon = createHumanIcon(memorials[0].lat, memorials[0].lng); }
        }, 500);
    </script>
</body>
</html>
